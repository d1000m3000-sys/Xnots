<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xnots</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; }
</style>

</head>

<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen p-4">

<h1 class="text-3xl font-bold text-center mb-6">📒 Xnots</h1>

<div class="max-w-xl mx-auto">

<!-- إدخال -->
<input id="title" placeholder="عنوان..."
class="w-full p-2 rounded mb-2">

<textarea id="note" placeholder="اكتب ملاحظتك..."
class="w-full p-2 rounded mb-2"></textarea>

<select id="category" class="w-full p-2 rounded mb-2">
<option>عام</option>
<option>شغل</option>
<option>دراسة</option>
<option>أفكار</option>
</select>

<input type="color" id="color" value="#ffffff" class="w-full mb-2">

<button onclick="addNote()"
class="w-full bg-indigo-500 text-white p-2 rounded mb-4">
➕ إضافة
</button>

<!-- بحث -->
<input id="search" oninput="render()"
placeholder="🔍 بحث..."
class="w-full p-2 rounded mb-4">

<!-- عرض -->
<div id="notes"></div>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("xnots")) || [];

function save(){
localStorage.setItem("xnots", JSON.stringify(notes));
}

function addNote(){
let note = {
id: Date.now(),
title: title.value,
text: noteInput.value,
category: category.value,
color: color.value,
pinned: false
};

notes.push(note);
save();
clearInputs();
render();
}

function clearInputs(){
title.value="";
noteInput.value="";
}

const title = document.getElementById("title");
const noteInput = document.getElementById("note");
const category = document.getElementById("category");
const color = document.getElementById("color");

function deleteNote(id){
notes = notes.filter(n=>n.id!==id);
save();
render();
}

function togglePin(id){
let n = notes.find(n=>n.id===id);
n.pinned = !n.pinned;
save();
render();
}

function render(){
let search = document.getElementById("search").value.toLowerCase();

let sorted = [...notes].sort((a,b)=>b.pinned - a.pinned);

let html="";

sorted.forEach(n=>{
if(
n.title.toLowerCase().includes(search) ||
n.text.toLowerCase().includes(search)
){
html+=`
<div class="p-3 rounded mb-2" style="background:${n.color}">
<div class="flex justify-between">
<b>${n.title || "بدون عنوان"}</b>
<div>
<button onclick="togglePin(${n.id})">📌</button>
<button onclick="deleteNote(${n.id})">❌</button>
</div>
</div>

<p>${n.text}</p>
<small>${n.category}</small>
</div>
`;
}
});

document.getElementById("notes").innerHTML = html;
}

render();

// PWA
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
