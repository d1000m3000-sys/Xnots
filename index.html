<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xnots</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; }
</style>
</head>

<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen p-4">

<h1 class="text-3xl font-bold text-center mb-6">📒 Xnots</h1>

<div class="max-w-xl mx-auto">

<input id="title" placeholder="عنوان..." class="w-full p-2 mb-2 rounded">
<textarea id="note" placeholder="اكتب..." class="w-full p-2 mb-2 rounded"></textarea>

<select id="category" class="w-full p-2 mb-2 rounded">
<option>عام</option>
<option>شغل</option>
<option>دراسة</option>
<option>أفكار</option>
</select>

<input type="color" id="color" class="w-full mb-2">

<button onclick="addNote()" class="w-full bg-indigo-500 text-white p-2 rounded mb-4">
➕ إضافة
</button>

<input id="search" oninput="render()" placeholder="🔍 بحث..."
class="w-full p-2 mb-4 rounded">

<div id="notes"></div>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("xnots")) || [];

function save(){ localStorage.setItem("xnots", JSON.stringify(notes)); }

function addNote(){
notes.push({
id: Date.now(),
title: title.value,
text: note.value,
category: category.value,
color: color.value || "#fff",
pinned:false
});
title.value=""; note.value="";
save(); render();
}

function deleteNote(id){
notes = notes.filter(n=>n.id!==id);
save(); render();
}

function pin(id){
let n = notes.find(n=>n.id===id);
n.pinned=!n.pinned;
save(); render();
}

function render(){
let s = search.value.toLowerCase();
let sorted = [...notes].sort((a,b)=>b.pinned - a.pinned);

notesDiv.innerHTML = sorted.filter(n=>
n.title.toLowerCase().includes(s) ||
n.text.toLowerCase().includes(s)
).map(n=>`
<div class="p-3 mb-2 rounded" style="background:${n.color}">
<div class="flex justify-between">
<b>${n.title||"بدون عنوان"}</b>
<div>
<button onclick="pin(${n.id})">📌</button>
<button onclick="deleteNote(${n.id})">❌</button>
</div>
</div>
<p>${n.text}</p>
<small>${n.category}</small>
</div>
`).join("");
}

const title = document.getElementById("title");
const note = document.getElementById("note");
const category = document.getElementById("category");
const color = document.getElementById("color");
const search = document.getElementById("search");
const notesDiv = document.getElementById("notes");

render();

// تسجيل Service Worker احترافي
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js").then(reg => {
reg.update();
});
}
</script>

</body>
</html>
