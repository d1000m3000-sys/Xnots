<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xnots</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Tajawal', sans-serif; }
</style>

</head>

<body class="bg-gradient-to-br from-indigo-100 to-purple-200 min-h-screen p-4">

<h1 class="text-3xl font-bold text-center mb-6">📒 Xnots</h1>

<div class="max-w-xl mx-auto">

<input id="note" placeholder="اكتب مذكرتك..."
class="w-full p-3 rounded-lg border mb-3">

<button onclick="addNote()"
class="w-full bg-indigo-500 text-white p-2 rounded-lg mb-4">
➕ إضافة
</button>

<div id="notes"></div>

</div>

<script>
let notes = JSON.parse(localStorage.getItem("xnots")) || [];

function addNote(){
let text = document.getElementById("note").value;
if(!text) return;

notes.push(text);
localStorage.setItem("xnots", JSON.stringify(notes));

document.getElementById("note").value="";
showNotes();
}

function deleteNote(i){
notes.splice(i,1);
localStorage.setItem("xnots", JSON.stringify(notes));
showNotes();
}

function showNotes(){
let html="";
notes.forEach((n,i)=>{
html+=`
<div class="bg-white p-3 rounded-lg mb-2 flex justify-between">
<span>${n}</span>
<button onclick="deleteNote(${i})">❌</button>
</div>`;
});
document.getElementById("notes").innerHTML=html;
}

showNotes();

// تسجيل Service Worker
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
